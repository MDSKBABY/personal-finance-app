server:
  port: 8080

spring:
  application:
    name: finance-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/personal_finance?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:finance_user}
    password: ${SPRING_DATASOURCE_PASSWORD:finance_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: warn

app:
  auth:
    username: ${APP_AUTH_USERNAME:admin}
    password: ${APP_AUTH_PASSWORD:}
    password-hash: ${APP_AUTH_PASSWORD_HASH:}
    cookie-name: ${APP_AUTH_COOKIE_NAME:finance_auth}
    session-hours: ${APP_AUTH_SESSION_HOURS:12}
    cookie-secure: ${APP_AUTH_COOKIE_SECURE:false}
    max-failed-attempts: ${APP_AUTH_MAX_FAILED_ATTEMPTS:5}
    lock-minutes: ${APP_AUTH_LOCK_MINUTES:10}
